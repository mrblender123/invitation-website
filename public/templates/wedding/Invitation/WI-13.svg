<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 366.9)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="5" text-anchor="middle"><tspan x="0" y="0">ובעזהשי״ת ביום שמחתכם ישמח ליבי גם אנו</tspan></text>
  <g id="bride_parents">
    <text transform="translate(180 387.1)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">הורי הכלה דוד ברעכער וריעיתו</tspan></text>
  </g>
  <g id="groom_parents">
    <text transform="translate(180 376.1)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">הורי החתן שמאול זאנוויל שווארץ וריעיתו</tspan></text>
  </g>
  <g id="celebration_time*">
    <text transform="translate(180 322.4)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">שמחת חתן וכלה בשעה </tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 334.5)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">באולם תפארת מרדכי</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 342.1)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">ברוקלין ניו יארק</tspan></text>
  </g>
  <g id="chupa_time*">
    <text transform="translate(180 312)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">החופה בשעה </tspan></text>
  </g>
  <g id="reception_time*">
    <text transform="translate(180 302.2)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">קבלת פנים בשעה </tspan></text>
  </g>
  <g id="date*">
    <text transform="translate(180 286.3)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">אור לי״ז שבט תשפ״ו לפ״ק</tspan></text>
  </g>
  <g id="day*">
    <text transform="translate(180 277.7)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">ביום רביעי לפרשת יתרו</tspan></text>
  </g>
  <text transform="translate(180 268.6)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">שתתקיים אי״ה בשעה טובה ומוצלחת</tspan></text>
  <text transform="translate(180 230)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="4.1" text-anchor="middle"><tspan x="0" y="0">הכלה</tspan></text>
  <text transform="translate(180 216.7)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="4.1" text-anchor="middle"><tspan x="0" y="0">עב״ג</tspan></text>
  <text transform="translate(180 256.4)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="4.1" text-anchor="middle"><tspan x="0" y="0">תחי׳</tspan></text>
  <text transform="translate(180 205.7)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="4.1" text-anchor="middle"><tspan x="0" y="0">נ״י</tspan></text>
  <g id="bride_name*">
    <text transform="translate(180 249.6)" fill="#aa7c59" font-family="Heebo" font-weight="700" font-size="24.3" text-anchor="middle"><tspan x="0" y="0">שרה</tspan></text>
  </g>
  <g id="groom_name*">
    <text transform="translate(180 197.3)" fill="#aa7c59" font-family="Heebo" font-weight="700" font-size="24.3" text-anchor="middle"><tspan x="0" y="0">שלמה זלמן</tspan></text>
  </g>
  <text transform="translate(180 178.1)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="4.1" text-anchor="middle"><tspan x="0" y="0">החתן</tspan></text>
  <text fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="180" y="162.5">להשתתף בשמחת כלולות בנינו היקרים</tspan></text>
  <text fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="180" y="151.9">הננו מתכבדים להזמין את כבודינו</tspan></text>
  <text transform="translate(180 142.9)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="7.5" text-anchor="middle"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 127.6)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0" xml:space="preserve">קול ששון  -  וקול שמחה  - קול חתן   -  וקול כלה</tspan></text>
  <text transform="translate(180 116.9)" fill="#aa7c59" font-family="Heebo" font-weight="400" font-size="6.7" text-anchor="middle"><tspan x="0" y="0">בעזרת השם יתברך</tspan></text>
</svg>
