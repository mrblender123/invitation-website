<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 83.1)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">בעזרת השם יתברך</tspan></text>
  <text transform="translate(180 96.5)" text-anchor="middle" fill="#071633" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0" xml:space="preserve">קול ששון  -  וקול שמחה  -  קול חתן  -  וקול כלה</tspan></text>
  <text transform="translate(180 115.7)" text-anchor="middle" font-family="Heebo" font-size="9.4" font-weight="400"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 127)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">הננו מתכבדים להזמין את כבודינו</tspan></text>
  <text transform="translate(180 140.2)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">להשתתף בשמחת כלולות בנינו היקרים</tspan></text>
  <text transform="translate(180 159.9)" text-anchor="middle" font-family="Heebo" font-size="5.2" font-weight="400"><tspan x="0" y="0">החתן</tspan></text>
  <text transform="translate(180 194.5)" text-anchor="middle" font-family="Heebo" font-size="5.2" font-weight="400"><tspan x="0" y="0">נ״י</tspan></text>
  <g id="groom_name*">
    <text transform="translate(180 184)" text-anchor="middle" fill="#916525" font-family="Heebo" font-size="30.4" font-weight="700"><tspan x="0" y="0">שלמה זלמן</tspan></text>
  </g>
  <text transform="translate(180 208.2)" text-anchor="middle" font-family="Heebo" font-size="5.2" font-weight="400"><tspan x="0" y="0">עב״ג</tspan></text>
  <text transform="translate(180 224.9)" text-anchor="middle" font-family="Heebo" font-size="5.2" font-weight="400"><tspan x="0" y="0">הכלה</tspan></text>
  <g id="bride_name*">
    <text transform="translate(180 249.5)" text-anchor="middle" fill="#916525" font-family="Heebo" font-size="30.4" font-weight="700"><tspan x="0" y="0">שרה</tspan></text>
  </g>
  <text transform="translate(180 258.1)" text-anchor="middle" font-family="Heebo" font-size="5.2" font-weight="400"><tspan x="0" y="0">תחי׳</tspan></text>
  <text transform="translate(180 273.4)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">שתתקיים אי״ה בשעה טובה ומוצלחת</tspan></text>
  <g id="day*">
    <text transform="translate(180 284.7)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">ביום רביעי לפרשת יתרו</tspan></text>
  </g>
  <g id="date*">
    <text transform="translate(180 295.5)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">אור לי״ז שבט תשפ״ו לפ״ק</tspan></text>
  </g>
  <g id="reception_time*">
    <text transform="translate(180 315.5)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">קבלת פנים בשעה</tspan></text>
  </g>
  <g id="chupa_time*">
    <text transform="translate(180 327.8)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">החופה בשעה</tspan></text>
  </g>
  <g id="celebration_time">
    <text transform="translate(180 340.8)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">שמחת חתן וכלה בשעה</tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 356)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">באולם תפארת מרדכי</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 365.5)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">ברוקלין ניו יארק</tspan></text>
  </g>
  <text transform="translate(180 396.6)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">ובעזהשי״ת ביום שמחתכם ישמח ליבי גם אנו</tspan></text>
  <g id="groom_parents">
    <text transform="translate(180 408.1)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">הורי החתן שמאול זאנוויל שווארץ וריעיתו</tspan></text>
  </g>
  <g id="bride_parents">
    <text transform="translate(180 422)" text-anchor="middle" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">הורי הכלה דוד ברעכער וריעיתו</tspan></text>
  </g>
</svg>
