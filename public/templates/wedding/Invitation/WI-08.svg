<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 120.6)" text-anchor="middle" fill="#d6aa6b" font-family="Heebo" font-size="51.6" font-weight="700"><tspan x="0" y="0">ש</tspan></text>
  <text transform="translate(180 146.3)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">בעזרת השם יתברך</tspan></text>
  <text transform="translate(180 156.4)" text-anchor="middle" fill="#071633" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0" xml:space="preserve">קול ששון  -  וקול שמחה  -  קול חתן  -  וקול כלה</tspan></text>
  <text transform="translate(180 170.8)" text-anchor="middle" font-family="Heebo" font-size="7.1" font-weight="400"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 179.2)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">הננו מתכבדים להזמין את כבודינו</tspan></text>
  <text transform="translate(180 189.2)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">להשתתף בשמחת כלולות בנינו היקרים</tspan></text>
  <text transform="translate(180 203.9)" text-anchor="middle" font-family="Heebo" font-size="3.9" font-weight="400"><tspan x="0" y="0">החתן</tspan></text>
  <text transform="translate(180 229.8)" text-anchor="middle" font-family="Heebo" font-size="3.9" font-weight="400"><tspan x="0" y="0">נ״י</tspan></text>
  <g id="groom_name*">
    <text transform="translate(180 221.9)" text-anchor="middle" fill="#d6aa6b" font-family="Heebo" font-size="22.8" font-weight="700"><tspan x="0" y="0">שלמה זלמן</tspan></text>
  </g>
  <text transform="translate(180 240.1)" text-anchor="middle" font-family="Heebo" font-size="3.9" font-weight="400"><tspan x="0" y="0">עב״ג</tspan></text>
  <text transform="translate(180 252.7)" text-anchor="middle" font-family="Heebo" font-size="3.9" font-weight="400"><tspan x="0" y="0">הכלה</tspan></text>
  <g id="bride_name*">
    <text transform="translate(180 271.1)" text-anchor="middle" fill="#d6aa6b" font-family="Heebo" font-size="22.8" font-weight="700"><tspan x="0" y="0">שרה</tspan></text>
  </g>
  <text transform="translate(180 277.5)" text-anchor="middle" font-family="Heebo" font-size="3.9" font-weight="400"><tspan x="0" y="0">תחי׳</tspan></text>
  <text transform="translate(180 289)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">שתתקיים אי״ה בשעה טובה ומוצלחת</tspan></text>
  <g id="day*">
    <text transform="translate(180 297.5)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">ביום רביעי לפרשת יתרו</tspan></text>
  </g>
  <g id="date*">
    <text transform="translate(180 305.6)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">אור לי״ז שבט תשפ״ו לפ״ק</tspan></text>
  </g>
  <g id="reception_time*">
    <text transform="translate(180 320.6)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">קבלת פנים בשעה</tspan></text>
  </g>
  <g id="chupa_time*">
    <text transform="translate(180 329.8)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">החופה בשעה</tspan></text>
  </g>
  <g id="celebration_time">
    <text transform="translate(180 339.5)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">שמחת חתן וכלה בשעה</tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 350.9)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">באולם תפארת מרדכי</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 358)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">ברוקלין ניו יארק</tspan></text>
  </g>
  <text transform="translate(180 381.4)" text-anchor="middle" font-family="Heebo" font-size="4.7" font-weight="400"><tspan x="0" y="0">ובעזהשי״ת ביום שמחתכם ישמח ליבי גם אנו</tspan></text>
  <g id="groom_parents">
    <text transform="translate(180 390)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">הורי החתן שמאול זאנוויל שווארץ וריעיתו</tspan></text>
  </g>
  <g id="bride_parents">
    <text transform="translate(180 400.4)" text-anchor="middle" font-family="Heebo" font-size="6.3" font-weight="400"><tspan x="0" y="0">הורי הכלה דוד ברעכער וריעיתו</tspan></text>
  </g>
</svg>
