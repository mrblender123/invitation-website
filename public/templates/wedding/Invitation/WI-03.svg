<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 109.9)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">בעזרת השם יתברך</tspan></text>
  <text transform="translate(180 121.5)" text-anchor="middle" fill="#071633" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0" xml:space="preserve">קול ששון  -  וקול שמחה  -  קול חתן  -  וקול כלה</tspan></text>
  <text transform="translate(180 138.2)" text-anchor="middle" font-family="Heebo" font-size="8.2" font-weight="400"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 147.9)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">הננו מתכבדים להזמין את כבודינו</tspan></text>
  <text transform="translate(180 159.4)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">להשתתף בשמחת כלולות בנינו היקרים</tspan></text>
  <text transform="translate(180 176.4)" text-anchor="middle" font-family="Heebo" font-size="4.5" font-weight="400"><tspan x="0" y="0">החתן</tspan></text>
  <text transform="translate(180 206.3)" text-anchor="middle" font-family="Heebo" font-size="4.5" font-weight="400"><tspan x="0" y="0">נ״י</tspan></text>
  <g id="groom_name*">
    <text transform="translate(180 197.2)" text-anchor="middle" fill="#be8f76" font-family="Heebo" font-size="26.3" font-weight="700"><tspan x="0" y="0">שלמה זלמן</tspan></text>
  </g>
  <text transform="translate(180 218.2)" text-anchor="middle" font-family="Heebo" font-size="4.5" font-weight="400"><tspan x="0" y="0">עב״ג</tspan></text>
  <text transform="translate(180 232.6)" text-anchor="middle" font-family="Heebo" font-size="4.5" font-weight="400"><tspan x="0" y="0">הכלה</tspan></text>
  <g id="bride_name*">
    <text transform="translate(180 253.9)" text-anchor="middle" fill="#be8f76" font-family="Heebo" font-size="26.3" font-weight="700"><tspan x="0" y="0">שרה</tspan></text>
  </g>
  <text transform="translate(180 261.3)" text-anchor="middle" font-family="Heebo" font-size="4.5" font-weight="400"><tspan x="0" y="0">תחי׳</tspan></text>
  <text transform="translate(180 274.6)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">שתתקיים אי״ה בשעה טובה ומוצלחת</tspan></text>
  <g id="day*">
    <text transform="translate(180 284.4)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">ביום רביעי לפרשת יתרו</tspan></text>
  </g>
  <g id="date*">
    <text transform="translate(180 293.7)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">אור לי״ז שבט תשפ״ו לפ״ק</tspan></text>
  </g>
  <g id="reception_time*">
    <text transform="translate(180 311)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">קבלת פנים בשעה</tspan></text>
  </g>
  <g id="chupa_time*">
    <text transform="translate(180 321.7)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">החופה בשעה</tspan></text>
  </g>
  <g id="celebration_time">
    <text transform="translate(180 332.9)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">שמחת חתן וכלה בשעה</tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 346)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">באולם תפארת מרדכי</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 354.3)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">ברוקלין ניו יארק</tspan></text>
  </g>
  <text transform="translate(180 381.2)" text-anchor="middle" font-family="Heebo" font-size="5.4" font-weight="400"><tspan x="0" y="0">ובעזהשי״ת ביום שמחתכם ישמח ליבי גם אנו</tspan></text>
  <g id="groom_parents">
    <text transform="translate(180 391.2)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">הורי החתן שמאול זאנוויל שווארץ וריעיתו</tspan></text>
  </g>
  <g id="bride_parents">
    <text transform="translate(180 403.2)" text-anchor="middle" font-family="Heebo" font-size="7.3" font-weight="400"><tspan x="0" y="0">הורי הכלה דוד ברעכער וריעיתו</tspan></text>
  </g>
</svg>
