<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 145.9)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">בעזרת השם יתברך</tspan></text>
  <text transform="translate(180 157.2)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0" xml:space="preserve">קול ששון  -  וקול שמחה  -  קול חתן  -  וקול כלה</tspan></text>
  <text transform="translate(180 173.3)" text-anchor="middle" font-family="Heebo" font-size="7.9" font-weight="400"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 182.7)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">הננו מתכבדים להזמין את כבודינו</tspan></text>
  <text transform="translate(180 193.8)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">להשתתף בשמחת כלולות בנינו היקרים</tspan></text>
  <text transform="translate(180 210.3)" text-anchor="middle" font-family="Heebo" font-size="4.3" font-weight="400"><tspan x="0" y="0">החתן</tspan></text>
  <text transform="translate(180 239.3)" text-anchor="middle" font-family="Heebo" font-size="4.3" font-weight="400"><tspan x="0" y="0">נ״י</tspan></text>
  <g id="groom_name*">
    <text transform="translate(180 230.5)" text-anchor="middle" fill="#684c0b" font-family="Heebo" font-size="25.5" font-weight="700"><tspan x="0" y="0">שלמה זלמן</tspan></text>
  </g>
  <text transform="translate(180 250.8)" text-anchor="middle" font-family="Heebo" font-size="4.3" font-weight="400"><tspan x="0" y="0">עב״ג</tspan></text>
  <text transform="translate(180 264.8)" text-anchor="middle" font-family="Heebo" font-size="4.3" font-weight="400"><tspan x="0" y="0">הכלה</tspan></text>
  <g id="bride_name*">
    <text transform="translate(180 285.4)" text-anchor="middle" fill="#684c0b" font-family="Heebo" font-size="25.5" font-weight="700"><tspan x="0" y="0">שרה</tspan></text>
  </g>
  <text transform="translate(180 292.6)" text-anchor="middle" font-family="Heebo" font-size="4.3" font-weight="400"><tspan x="0" y="0">תחי׳</tspan></text>
  <text transform="translate(180 305.5)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">שתתקיים אי״ה בשעה טובה ומוצלחת</tspan></text>
  <g id="day*">
    <text transform="translate(180 315)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">ביום רביעי לפרשת יתרו</tspan></text>
  </g>
  <g id="date*">
    <text transform="translate(180 324)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">אור לי״ז שבט תשפ״ו לפ״ק</tspan></text>
  </g>
  <g id="reception_time*">
    <text transform="translate(180 340.8)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">קבלת פנים בשעה</tspan></text>
  </g>
  <g id="chupa_time*">
    <text transform="translate(180 351.1)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">החופה בשעה</tspan></text>
  </g>
  <g id="celebration_time">
    <text transform="translate(180 362)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">שמחת חתן וכלה בשעה</tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 374.7)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">באולם תפארת מרדכי</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 382.7)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">ברוקלין ניו יארק</tspan></text>
  </g>
  <text transform="translate(180 408.8)" text-anchor="middle" font-family="Heebo" font-size="5.3" font-weight="400"><tspan x="0" y="0">ובעזהשי״ת ביום שמחתכם ישמח ליבי גם אנו</tspan></text>
  <g id="groom_parents">
    <text transform="translate(180 418.4)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">הורי החתן שמאול זאנוויל שווארץ וריעיתו</tspan></text>
  </g>
  <g id="bride_parents">
    <text transform="translate(180 430)" text-anchor="middle" font-family="Heebo" font-size="7" font-weight="400"><tspan x="0" y="0">הורי הכלה דוד ברעכער וריעיתו</tspan></text>
  </g>
</svg>
