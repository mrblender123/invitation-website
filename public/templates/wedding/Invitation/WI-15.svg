<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 418.8)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="6" text-anchor="middle"><tspan x="0" y="0">ובעזהשי״ת ביום שמחתכם ישמח ליבי גם אנו</tspan></text>
  <g id="bride_parents">
    <text transform="translate(180 442.9)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">הורי הכלה דוד ברעכער וריעיתו</tspan></text>
  </g>
  <g id="groom_parents">
    <text transform="translate(180 429.7)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">הורי החתן שמאול זאנוויל שווארץ וריעיתו</tspan></text>
  </g>
  <g id="celebration_time*">
    <text transform="translate(180 365.6)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">שמחת חתן וכלה בשעה </tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 380.1)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">באולם תפארת מרדכי</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 389.1)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">ברוקלין ניו יארק</tspan></text>
  </g>
  <g id="chupa_time*">
    <text transform="translate(180 353.2)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">החופה בשעה </tspan></text>
  </g>
  <g id="reception_time*">
    <text transform="translate(180 341.5)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">קבלת פנים בשעה </tspan></text>
  </g>
  <g id="date*">
    <text transform="translate(180 322.5)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">אור לי״ז שבט תשפ״ו לפ״ק</tspan></text>
  </g>
  <g id="day*">
    <text transform="translate(180 312.2)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">ביום רביעי לפרשת יתרו</tspan></text>
  </g>
  <text transform="translate(180 301.4)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">שתתקיים אי״ה בשעה טובה ומוצלחת</tspan></text>
  <text transform="translate(180 255.2)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">הכלה</tspan></text>
  <text transform="translate(180 239.3)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">עב״ג</tspan></text>
  <text transform="translate(180 286.8)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">תחי׳</tspan></text>
  <text transform="translate(180 226.2)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">נ״י</tspan></text>
  <g id="bride_name*">
    <text transform="translate(180 278.6)" fill="#9e7045" font-family="Heebo" font-weight="700" font-size="29" text-anchor="middle"><tspan x="0" y="0">שרה</tspan></text>
  </g>
  <g id="groom_name*">
    <text transform="translate(180 216.2)" fill="#9e7045" font-family="Heebo" font-weight="700" font-size="29" text-anchor="middle"><tspan x="0" y="0">שלמה זלמן</tspan></text>
  </g>
  <text transform="translate(180 193.3)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">החתן</tspan></text>
  <text fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="180" y="174.5">להשתתף בשמחת כלולות בנינו היקרים</tspan></text>
  <text fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="180" y="161.9">הננו מתכבדים להזמין את כבודינו</tspan></text>
  <text transform="translate(180 151.2)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="9" text-anchor="middle"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 132.9)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0" xml:space="preserve">קול ששון  -  וקול שמחה  - קול חתן   -  וקול כלה</tspan></text>
  <text transform="translate(180 120.1)" fill="#89774c" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">בעזרת השם יתברך</tspan></text>
</svg>
