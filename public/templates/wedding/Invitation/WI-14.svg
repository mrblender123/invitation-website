<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 394.4)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="6" text-anchor="middle"><tspan x="0" y="0">ובעזהשי״ת ביום שמחתכם ישמח ליבי גם אנו</tspan></text>
  <g id="bride_parents">
    <text transform="translate(180 418.6)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">הורי הכלה דוד ברעכער וריעיתו</tspan></text>
  </g>
  <g id="groom_parents">
    <text transform="translate(180 405.4)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">הורי החתן שמאול זאנוויל שווארץ וריעיתו</tspan></text>
  </g>
  <g id="celebration_time*">
    <text transform="translate(180 341.3)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">שמחת חתן וכלה בשעה </tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 355.7)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">באולם תפארת מרדכי</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 364.8)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">ברוקלין ניו יארק</tspan></text>
  </g>
  <g id="chupa_time*">
    <text transform="translate(180 328.9)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">החופה בשעה </tspan></text>
  </g>
  <g id="reception_time*">
    <text transform="translate(180 317.2)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">קבלת פנים בשעה </tspan></text>
  </g>
  <g id="date*">
    <text transform="translate(180 298.1)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">אור לי״ז שבט תשפ״ו לפ״ק</tspan></text>
  </g>
  <g id="day*">
    <text transform="translate(180 287.8)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">ביום רביעי לפרשת יתרו</tspan></text>
  </g>
  <text transform="translate(180 277.1)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">שתתקיים אי״ה בשעה טובה ומוצלחת</tspan></text>
  <text transform="translate(180 230.9)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">הכלה</tspan></text>
  <text transform="translate(180 215)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">עב״ג</tspan></text>
  <text transform="translate(180 262.4)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">תחי׳</tspan></text>
  <text transform="translate(180 201.9)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">נ״י</tspan></text>
  <g id="bride_name*">
    <text transform="translate(180 254.3)" fill="#8a6324" font-family="Heebo" font-weight="700" font-size="29" text-anchor="middle"><tspan x="0" y="0">שרה</tspan></text>
  </g>
  <g id="groom_name*">
    <text transform="translate(180 191.8)" fill="#8a6324" font-family="Heebo" font-weight="700" font-size="29" text-anchor="middle"><tspan x="0" y="0">שלמה זלמן</tspan></text>
  </g>
  <text transform="translate(180 168.9)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="4.9" text-anchor="middle"><tspan x="0" y="0">החתן</tspan></text>
  <text fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="180" y="150.2">להשתתף בשמחת כלולות בנינו היקרים</tspan></text>
  <text fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="180" y="137.6">הננו מתכבדים להזמין את כבודינו</tspan></text>
  <text transform="translate(180 126.9)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="9" text-anchor="middle"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 108.6)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0" xml:space="preserve">קול ששון  -  וקול שמחה  - קול חתן   -  וקול כלה</tspan></text>
  <text transform="translate(180 95.8)" fill="#bf974a" font-family="Heebo" font-weight="400" font-size="8" text-anchor="middle"><tspan x="0" y="0">בעזרת השם יתברך</tspan></text>
</svg>
