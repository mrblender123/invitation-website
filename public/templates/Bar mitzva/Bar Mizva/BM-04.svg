<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 132.5)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="6.5" font-weight="800"><tspan x="0" y="0">ברוב שמחה והודאה להשי״ת הננו מתכבדים להזמין את</tspan></text>
  <text transform="translate(180 140.9)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="8.1" font-weight="800"><tspan x="0" y="0">ידידינו וקרובינו ומכובדינו שיחיו</tspan></text>
  <text transform="translate(180 148.1)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="6.5" font-weight="800"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 240.2)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="7.1" font-weight="800"><tspan x="0" y="0">של בני היקר</tspan></text>
  <g id="boy_name*">
    <text transform="translate(180 252.9)" text-anchor="middle" fill="#50311f" font-family="Heebo" font-size="13.8" font-weight="800"><tspan x="0" y="0">אברהם</tspan></text>
  </g>
  <text transform="translate(180 265.8)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="6.4" font-weight="800"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  <g id="day*">
    <text transform="translate(180 279.9)" text-anchor="middle" fill="#50311f" font-family="Heebo" font-size="14.8" font-weight="800"><tspan x="0" y="0">ביום א׳ פרשת שמות</tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 293.4)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="9.7" font-weight="800"><tspan x="0" y="0">באולם פרדס נח</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 304.8)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="9.7" font-weight="800"><tspan x="0" y="0">5015 15th Ave</tspan></text>
  </g>
  <g id="time*">
    <text transform="translate(180 320.7)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="9.4" font-weight="800"><tspan x="0" y="0">בשעה 10:00</tspan></text>
  </g>
  <g id="closing*">
    <text transform="translate(180 346)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="6.5" font-weight="800"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="host_name*">
    <text transform="translate(180 357.8)" text-anchor="middle" fill="#50311f" font-family="Heebo" font-size="14.8" font-weight="800"><tspan x="0" y="0">מרדכי זאב ראטה</tspan></text>
  </g>
  <g id="father_line_1*">
    <text transform="translate(180 365.6)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="5.7" font-weight="800"><tspan x="0" y="0">ב״ר בנימין משה הי״ו</tspan></text>
  </g>
  <g id="father_line_2*">
    <text transform="translate(180 371.5)" text-anchor="middle" fill="#865e30" font-family="Heebo" font-size="5.7" font-weight="800"><tspan x="0" y="0">חתן בערל גרינפעלד הי״ו</tspan></text>
  </g>
