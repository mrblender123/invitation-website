<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 117.6)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="7.3" font-weight="800"><tspan x="0" y="0">ברוב שמחה והודאה להשי״ת הננו מתכבדים להזמין את</tspan></text>
  <text transform="translate(180 127.2)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="9.1" font-weight="800"><tspan x="0" y="0">ידידינו וקרובינו ומכובדינו שיחיו</tspan></text>
  <text transform="translate(180 135.3)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="7.3" font-weight="800"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 196.8)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="9.8" font-weight="800"><tspan x="0" y="0">של בני היקר</tspan></text>
  <g id="boy_name*">
    <text transform="translate(180 214)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="18.8" font-weight="800"><tspan x="0" y="0">אברהם</tspan></text>
  </g>
  <text transform="translate(180 241.6)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="8.8" font-weight="800"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  <g id="day*">
    <text transform="translate(180 261)" text-anchor="middle" fill="#b5aa9b" font-family="Heebo" font-size="20.2" font-weight="800"><tspan x="0" y="0">ביום א׳ פרשת שמות</tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 279.4)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="13.3" font-weight="800"><tspan x="0" y="0">באולם פרדס נח</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 295.1)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="13.3" font-weight="800"><tspan x="0" y="0">5015 15th Ave</tspan></text>
  </g>
  <g id="time*">
    <text transform="translate(180 316.8)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="12.8" font-weight="800"><tspan x="0" y="0">בשעה 10:00</tspan></text>
  </g>
  <g id="closing*">
    <text transform="translate(180 351.4)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="8.8" font-weight="800"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="host_name*">
