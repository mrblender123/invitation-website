  </g>
  <g id="father_line_1*">
    <text transform="translate(180 378.3)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="7.8" font-weight="800"><tspan x="0" y="0">ב״ר בנימין משה הי״ו</tspan></text>
  </g>
  <g id="father_line_2*">
    <text transform="translate(180 386.4)" text-anchor="middle" fill="#bdb6ae" font-family="Heebo" font-size="7.8" font-weight="800"><tspan x="0" y="0">חתן בערל גרינפעלד הי״ו</tspan></text>
