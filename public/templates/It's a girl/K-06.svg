<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 91.8)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="8.3" font-weight="400"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 102.5)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="9.3" font-weight="400"><tspan x="0" y="0">הננו מתכבדים להזמין את כבוד ידידנו</tspan></text>
  <text transform="translate(180 113.1)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="9.3" font-weight="400"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 185.4)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="13.8" font-weight="400"><tspan x="0" y="0">לרגל הולדת בתי למז״ט</tspan></text>
  <text transform="translate(180 204.5)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="8.6" font-weight="400"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  <g id="day*">
    <text transform="translate(180 222.6)" text-anchor="middle" fill="#b56561" font-family="Heebo" font-size="19" font-weight="400"><tspan x="0" y="0">ביום שבת קודש</tspan></text>
  </g>
  <g id="parasha*">
    <text transform="translate(180 239.9)" text-anchor="middle" fill="#b56561" font-family="Heebo" font-size="19" font-weight="400"><tspan x="0" y="0">פרשת ויגש</tspan></text>
  </g>
  <g id="location*">
    <text transform="translate(180 265.5)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="12.8" font-weight="400"><tspan x="0" y="0">בביהמ״ד קהל חסידי בעלזא</tspan></text>
  </g>
  <g id="street*">
    <text transform="translate(180 281.8)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="12.8" font-weight="400"><tspan x="0" y="0">1247 38th St</tspan></text>
  </g>
  <g id="time*">
    <text transform="translate(180 307)" text-anchor="middle" fill="#b56561" font-family="Heebo" font-size="19" font-weight="400"><tspan x="0" y="0">שחרית</tspan></text>
  </g>
  <g id="greeting">
    <text transform="translate(180 352.6)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="12.8" font-weight="400"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="host_name*">
    <text transform="translate(180 374)" text-anchor="middle" fill="#b56561" font-family="Heebo" font-size="19.8" font-weight="400"><tspan x="0" y="0">ברוך זאב ראטנבערג</tspan></text>
  </g>
  <g id="father_name_2*">
    <text transform="translate(180 396.2)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="12.8" font-weight="400"><tspan x="0" y="0">ב״ר בנימין משה הי״ו</tspan></text>
  </g>
  <g id="father_name_1*">
    <text transform="translate(180 411.9)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="12.8" font-weight="400"><tspan x="0" y="0">חתן בערל גרינפעלד הי״ו</tspan></text>
  </g>
</svg>
