  </g>
  <g id="location*">
    <text transform="translate(180 315.7)" text-anchor="middle" fill="#d66547" font-family="Heebo" font-size="8.6" font-weight="700"><tspan x="0" y="0">בביהמ״ד קהל חסידי בעלזא</tspan></text>
  </g>
  <g id="street*">
    <text transform="translate(180 327.3)" text-anchor="middle" fill="#d66547" font-family="Heebo" font-size="8.6" font-weight="700"><tspan x="0" y="0">1247 38th St</tspan></text>
  </g>
  <g id="time*">
    <text transform="translate(180 344.5)" text-anchor="middle" fill="#d66547" font-family="Heebo" font-size="12.8" font-weight="700"><tspan x="0" y="0">שחרית</tspan></text>
  </g>
  <g id="greeting">
    <text transform="translate(180 375.7)" text-anchor="middle" fill="#d66547" font-family="Heebo" font-size="8.6" font-weight="700"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="host_name*">
