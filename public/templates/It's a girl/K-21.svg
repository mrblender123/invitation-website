<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
    <g id="text6">
    <text transform="translate(180 120.1)" text-anchor="middle" fill="#d66547" font-family="Heebo" font-size="5.5" font-weight="700"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  </g>
    <g id="text5">
    <text transform="translate(180 128.6)" text-anchor="middle" fill="#d66547" font-family="Heebo" font-size="7.3" font-weight="700"><tspan x="0" y="0">הננו מתכבדים להזמין את כבוד ידידנו</tspan></text>
  </g>
    <g id="text4">
    <text transform="translate(180 136.9)" text-anchor="middle" fill="#d66547" font-family="Heebo" font-size="6.6" font-weight="700"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  </g>
    <g id="text3">
    <text transform="translate(180 255.5)" text-anchor="middle" fill="#d66547" font-family="Heebo" font-size="9.3" font-weight="700"><tspan x="0" y="0">לרגל הולדת בתי למז״ט</tspan></text>
  </g>
    <g id="text2">
    <text transform="translate(180 275.3)" text-anchor="middle" fill="#d66547" font-family="Heebo" font-size="5.8" font-weight="700"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  </g>
  <g id="day*">
