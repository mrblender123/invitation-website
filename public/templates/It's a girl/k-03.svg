<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 115.8)" text-anchor="middle" fill="#8b5e3c" font-family="Playpen Sans Hebrew" font-size="7.5" font-weight="800"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 124.4)" text-anchor="middle" fill="#8b5e3c" font-family="Playpen Sans Hebrew" font-size="7.5" font-weight="800"><tspan x="0" y="0">הננו מתכבדים להזמין את כבוד ידידנו</tspan></text>
  <text transform="translate(180 133)" text-anchor="middle" fill="#8b5e3c" font-family="Playpen Sans Hebrew" font-size="7.5" font-weight="800"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 187.4)" text-anchor="middle" fill="#8b5e3c" font-family="Playpen Sans Hebrew" font-size="11.1" font-weight="800"><tspan x="0" y="0">לרגל הולדת בתי למז״ט</tspan></text>
  <text transform="translate(180 213.3)" text-anchor="middle" fill="#8b5e3c" font-family="Playpen Sans Hebrew" font-size="7" font-weight="800"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  <g id="day*">
    <text transform="translate(180 228.8)" text-anchor="middle" fill="#603913" font-family="Playpen Sans Hebrew" font-size="15.3" font-weight="800"><tspan x="0" y="0">ביום שבת קודש</tspan></text>
  </g>
  <g id="parasha*">
    <text transform="translate(180 243.1)" text-anchor="middle" fill="#603913" font-family="Playpen Sans Hebrew" font-size="15.3" font-weight="800"><tspan x="0" y="0">פרשת ויגש</tspan></text>
  </g>
  <g id="location*">
    <text transform="translate(180 262.6)" text-anchor="middle" fill="#603913" font-family="Playpen Sans Hebrew" font-size="10.3" font-weight="800"><tspan x="0" y="0">בביהמ״ד קהל חסידי בעלזא</tspan></text>
  </g>
  <g id="street*">
    <text transform="translate(180 276.1)" text-anchor="middle" fill="#603913" font-family="Playpen Sans Hebrew" font-size="10.3" font-weight="800"><tspan x="0" y="0">1247 38th St</tspan></text>
  </g>
  <g id="time*">
    <text transform="translate(180 296.9)" text-anchor="middle" fill="#603913" font-family="Playpen Sans Hebrew" font-size="15.3" font-weight="800"><tspan x="0" y="0">שחרית</tspan></text>
  </g>
  <g id="greeting">
    <text transform="translate(180 329.1)" text-anchor="middle" fill="#8b5e3c" font-family="Playpen Sans Hebrew" font-size="10.3" font-weight="800"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="host_name*">
    <text transform="translate(180 349.7)" text-anchor="middle" fill="#603913" font-family="Playpen Sans Hebrew" font-size="16" font-weight="800"><tspan x="0" y="0">ברוך זאב ראטנבערג</tspan></text>
  </g>
  <g id="father_name_2*">
    <text transform="translate(180 367.9)" text-anchor="middle" fill="#8b5e3c" font-family="Playpen Sans Hebrew" font-size="10.3" font-weight="800"><tspan x="0" y="0">ב״ר בנימין משה הי״ו</tspan></text>
  </g>
  <g id="father_name_1*">
    <text transform="translate(180 380.6)" text-anchor="middle" fill="#8b5e3c" font-family="Playpen Sans Hebrew" font-size="10.3" font-weight="800"><tspan x="0" y="0">חתן בערל גרינפעלד הי״ו</tspan></text>
  </g>
