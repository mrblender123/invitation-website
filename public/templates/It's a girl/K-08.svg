<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 98.3)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="8" font-weight="600"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 108.5)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="8.9" font-weight="600"><tspan x="0" y="0">הננו מתכבדים להזמין את כבוד ידידנו</tspan></text>
  <text transform="translate(180 118.7)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="8.9" font-weight="600"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 187.5)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="13.2" font-weight="600"><tspan x="0" y="0">לרגל הולדת בתי למז״ט</tspan></text>
  <text transform="translate(180 214.6)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="8.2" font-weight="600"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  <g id="day*">
    <text transform="translate(180 231.9)" text-anchor="middle" fill="#986666" font-family="Heebo" font-size="18.1" font-weight="600"><tspan x="0" y="0">ביום שבת קודש</tspan></text>
  </g>
  <g id="parasha*">
    <text transform="translate(180 248.9)" text-anchor="middle" fill="#986666" font-family="Heebo" font-size="18.1" font-weight="600"><tspan x="0" y="0">פרשת ויגש</tspan></text>
  </g>
  <g id="location*">
    <text transform="translate(180 272.6)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="12.2" font-weight="600"><tspan x="0" y="0">בביהמ״ד קהל חסידי בעלזא</tspan></text>
  </g>
  <g id="street*">
    <text transform="translate(180 288.2)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="12.2" font-weight="600"><tspan x="0" y="0">1247 38th St</tspan></text>
  </g>
  <g id="time*">
    <text transform="translate(180 312.7)" text-anchor="middle" fill="#986666" font-family="Heebo" font-size="18.1" font-weight="600"><tspan x="0" y="0">שחרית</tspan></text>
  </g>
  <g id="greeting">
    <text transform="translate(180 356.2)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="12.2" font-weight="600"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="host_name*">
    <text transform="translate(180 376.6)" text-anchor="middle" fill="#986666" font-family="Heebo" font-size="18.9" font-weight="600"><tspan x="0" y="0">ברוך זאב ראטנבערג</tspan></text>
  </g>
  <g id="father_name_2*">
    <text transform="translate(180 397.8)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="12.2" font-weight="600"><tspan x="0" y="0">ב״ר בנימין משה הי״ו</tspan></text>
  </g>
  <g id="father_name_1*">
    <text transform="translate(180 412.9)" text-anchor="middle" fill="#939598" font-family="Heebo" font-size="12.2" font-weight="600"><tspan x="0" y="0">חתן בערל גרינפעלד הי״ו</tspan></text>
  </g>
</svg>
