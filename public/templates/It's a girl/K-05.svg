<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 146.3)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="6" font-weight="700"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 154)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="6.7" font-weight="700"><tspan x="0" y="0">הננו מתכבדים להזמין את כבוד ידידנו</tspan></text>
  <text transform="translate(180 161.7)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="6.7" font-weight="700"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 205.8)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="9.9" font-weight="700"><tspan x="0" y="0">לרגל הולדת בתי למז״ט</tspan></text>
  <text transform="translate(180 227.4)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="6.2" font-weight="700"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  <g id="day*">
    <text transform="translate(180 240.5)" text-anchor="middle" fill="#ca8888" font-family="Heebo" font-size="13.7" font-weight="700"><tspan x="0" y="0">ביום שבת קודש</tspan></text>
  </g>
  <g id="parasha*">
    <text transform="translate(180 253.2)" text-anchor="middle" fill="#ca8888" font-family="Heebo" font-size="13.7" font-weight="700"><tspan x="0" y="0">פרשת ויגש</tspan></text>
  </g>
  <g id="location*">
    <text transform="translate(180 271.4)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="9.2" font-weight="700"><tspan x="0" y="0">בביהמ״ד קהל חסידי בעלזא</tspan></text>
  </g>
  <g id="street*">
    <text transform="translate(180 283.1)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="9.2" font-weight="700"><tspan x="0" y="0">1247 38th St</tspan></text>
  </g>
  <g id="time*">
    <text transform="translate(180 301.4)" text-anchor="middle" fill="#ca8888" font-family="Heebo" font-size="13.7" font-weight="700"><tspan x="0" y="0">שחרית</tspan></text>
  </g>
  <g id="greeting">
    <text transform="translate(180 334.2)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="9.2" font-weight="700"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="host_name*">
    <text transform="translate(180 349.6)" text-anchor="middle" fill="#ca8888" font-family="Heebo" font-size="14.3" font-weight="800"><tspan x="0" y="0">ברוך זאב ראטנבערג</tspan></text>
  </g>
  <g id="father_name_2*">
    <text transform="translate(180 365.6)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="9.2" font-weight="700"><tspan x="0" y="0">ב״ר בנימין משה הי״ו</tspan></text>
  </g>
  <g id="father_name_1*">
    <text transform="translate(180 376.9)" text-anchor="middle" fill="#a2a78f" font-family="Heebo" font-size="9.2" font-weight="700"><tspan x="0" y="0">חתן בערל גרינפעלד הי״ו</tspan></text>
  </g>
</svg>
