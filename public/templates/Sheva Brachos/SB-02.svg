<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 130.9)" text-anchor="middle" fill="#988574" font-family="Heebo" font-size="7" font-weight="700"><tspan x="0" y="0">מתוך שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 139.6)" text-anchor="middle" fill="#988574" font-family="Heebo" font-size="8" font-weight="700"><tspan x="0" y="0">הננו מתכבדים בזה להזמין את מע״כ</tspan></text>
  <text transform="translate(180 148.7)" text-anchor="middle" fill="#988574" font-family="Heebo" font-size="7" font-weight="700"><tspan x="0" y="0">לבוא להשתתף בשמחת</tspan></text>
  <text transform="translate(180 251.5)" text-anchor="middle" fill="#988574" font-family="Heebo" font-size="7.9" font-weight="600"><tspan x="0" y="0">אשר נערך לכבוד שמחת נישוא׳</tspan></text>
  <g id="couple_name*">
    <text transform="translate(180 274)" text-anchor="middle" fill="#ab9573" font-family="Heebo" font-size="15" font-weight="900"><tspan x="0" y="0">מנשה וחנה</tspan></text>
  </g>
  <g id="couple_family_name*">
