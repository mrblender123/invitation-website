<svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 360 504">
  <text transform="translate(180 53.8) scale(1 1)" text-anchor="middle" fill="#f4f8fb" font-family="Heebo" font-size="8" font-weight="900"><tspan x="0" y="0">בשמחת הולדת בני שיחי׳</tspan></text>
  <text transform="translate(180 61.4) scale(1 1)" text-anchor="middle" fill="#f4f8fb" font-family="Heebo" font-size="6" font-weight="600"><tspan x="0" y="0">למזל טוב</tspan></text>
  <text transform="translate(180 67.7) scale(1 1)" text-anchor="middle" fill="#f4f8fb" font-family="Heebo" font-size="5" font-weight="500"><tspan x="0" y="0">אתכבד בזה להזמין את כל קרובי וידידי</tspan></text>
  <text transform="translate(180 75.2) scale(1 1)" text-anchor="middle" fill="#f4f8fb" font-family="Heebo" font-size="6" font-weight="500"><tspan x="0" y="0">לבוא ולהשתתף בשמחתי אצל</tspan></text>
  <text transform="translate(180 255) scale(.8 1)" text-anchor="middle" fill="#f4f8fb" font-family="Heebo" font-size="13.8"><tspan x="0" y="0">שתקיים אי״ה בליל שבת קודש</tspan></text>
  <g id="parsha*">
    <text transform="translate(180 272.4) scale(.8 1)" text-anchor="middle" fill="#f4f8fb" font-family="Heebo" font-size="19.5" font-weight="900"><tspan x="0" y="0">פרשת נשא</tspan></text>
  </g>
  <g id="location*">
    <text transform="translate(180 284.2) scale(.8 1)" text-anchor="middle" fill="#f4f8fb" font-family="Heebo" font-size="9.4" font-weight="600"><tspan x="0" y="0">בביהמ״ד לעלוב</tspan></text>
  </g>
  <g id="street*">
    <text transform="translate(180 294.3) scale(.8 1)" text-anchor="middle" fill="#f4f8fb" font-family="Heebo" font-size="9.4" font-weight="600"><tspan x="0" y="0">1693 49th Steet</tspan></text>
  </g>
  <text transform="translate(180 452.8) scale(.8 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="9.6"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  <g id="host_name*">
    <text transform="translate(180 465.7) scale(.8 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="11.1" font-weight="900"><tspan x="0" y="0">מרדכי זאב ראטה</tspan></text>
  </g>
  <g id="father_name_1*">
    <text transform="translate(180 474.8) scale(.8 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="6" font-weight="400"><tspan x="0" y="0">ב״ר בנימין משה הי״וו</tspan></text>
  </g>
</svg>
