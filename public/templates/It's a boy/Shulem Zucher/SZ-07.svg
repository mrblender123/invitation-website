<svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 360 504">
  <text transform="translate(180 101.9)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="9.3"><tspan x="0" y="0">מתוך שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 114)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="9.3"><tspan x="0" y="0">על כל הטוב אשר גמלנו</tspan></text>
  <text transform="translate(180 130.3)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="15.2"><tspan x="0" y="0">בשמחת הולדת בני שיחי׳</tspan></text>
  <text transform="translate(180 149.5)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="11.3"><tspan x="0" y="0">למזל טוב</tspan></text>
  <text transform="translate(180 166.4)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="9.3"><tspan x="0" y="0">אתכבד בזה להזמין את כל קרובי וידידי</tspan></text>
  <text transform="translate(180 177.5)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="9.3"><tspan x="0" y="0">לבוא ולהשתתף בשמחתי אצל</tspan></text>
  <text transform="translate(180 265.8) scale(.9 1)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="16.5"><tspan x="0" y="0">שתקיים אי״ה בליל שבת קודש</tspan></text>
  <g id="parsha">
    <text transform="translate(180 294.8) scale(.9 1)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="23.3"><tspan x="0" y="0">פרשת נשא</tspan></text>
  </g>
  <g id="location">
    <text transform="translate(180 318.7) scale(.9 1)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="11.2"><tspan x="0" y="0">בביהמ״ד לעלוב</tspan><tspan x="0" y="12.4">1693 49th Street</tspan></text>
  </g>
  <text transform="translate(180 355.2) scale(.9 1)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="14.3"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  <g id="host_name">
    <text transform="translate(180 374.7) scale(.9 1)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="16.6"><tspan x="0" y="0">מרדכי זאב ראטה</tspan></text>
  </g>
  <g id="father_name_1">
    <text transform="translate(180 397.8) scale(.9 1)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="9"><tspan x="0" y="0">ב״ר בנימין משה הי״וו</tspan></text>
  </g>
  <g id="father_name_2">
    <text transform="translate(180 410.4) scale(.9 1)" text-anchor="middle" fill="#bcbec0" font-family="Secular One" font-size="9"><tspan x="0" y="0">חתן בערל גרינעלד הי״וו</tspan></text>
  </g>
