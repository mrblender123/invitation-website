<svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 864 1216">
  <text transform="translate(569.8 95.8) scale(.9 1)" text-anchor="middle" fill="#cfd0cb" font-family="Secular One">
