    <tspan font-size="40.1" x="0" y="161">למזל טוב</tspan>
    <tspan font-size="37.1" x="0" y="205.5">אתכבד בזה להזמין את כל קרובי וידידי</tspan>
    <tspan font-size="37.1" x="0" y="249.9">לבוא ולהשתתף בשמחתי אצל</tspan>
