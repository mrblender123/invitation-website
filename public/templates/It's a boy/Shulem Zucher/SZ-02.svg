<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 49.4)" text-anchor="middle" fill="#d0d1cc" font-family="Secular One" font-size="13.6"><tspan x="0" y="0">מתוך שבח והודאה להשי״ת</tspan></text>
