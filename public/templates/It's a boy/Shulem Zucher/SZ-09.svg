<svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 360 504">
  <text transform="translate(180 90.8) scale(1.1 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="10.1"><tspan x="0" y="0">מתוך שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 103.9) scale(1.1 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="10.1"><tspan x="0" y="0">על כל הטוב אשר גמלנו</tspan></text>
  <text transform="translate(180 123.6) scale(1.1 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="16.5"><tspan x="0" y="0">בשמחת הולדת בני שיחי׳</tspan></text>
  <text transform="translate(180 141.9) scale(1.1 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="15"><tspan x="0" y="0">למזל טוב</tspan></text>
  <text transform="translate(180 164.8) scale(1.1 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="10.1"><tspan x="0" y="0">אתכבד בזה להזמין את כל קרובי וידידי</tspan></text>
  <text transform="translate(180 176.8) scale(1.1 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="10.1"><tspan x="0" y="0">לבוא ולהשתתף בשמחתי אצל</tspan></text>
  <text transform="translate(180 274.6) rotate(-.5) scale(.9 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="17.9"><tspan x="0" y="0">שתקיים אי״ה בליל שבת קודש</tspan></text>
  <g id="parsha*">
    <text transform="translate(180 297.1) scale(.9 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="25.2"><tspan x="0" y="0">פרשת נשא</tspan></text>
  </g>
  <g id="location*">
    <text transform="translate(180 320) scale(.9 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="12.1"><tspan x="0" y="0">בביהמ״ד לעלוב</tspan></text>
  </g>
  <g id="street*">
    <text transform="translate(180 332.6) scale(.9 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="12.1"><tspan x="0" y="0">1693 49th Street</tspan></text>
  </g>
  <g id="greeting*">
    <text transform="translate(180 359.6) scale(.9 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="15.5"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="host_name*">
    <text transform="translate(180 380.8) scale(.9 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="18"><tspan x="0" y="0">מרדכי זאב ראטה</tspan></text>
  </g>
  <g id="father_name_1*">
    <text transform="translate(180 395.8) scale(.9 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="9.7"><tspan x="0" y="0">ב״ר בנימין משה הי״וו</tspan></text>
  </g>
  <g id="father_name_2*">
    <text transform="translate(180 406.5) scale(.9 1)" text-anchor="middle" fill="#dad2b9" font-family="Secular One" font-size="9.7"><tspan x="0" y="0">חתן בערל גרינפעלד הי״וו</tspan></text>
  </g>
