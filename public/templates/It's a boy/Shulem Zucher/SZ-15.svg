  </g>
  <g id="father_name_1*">
    <text transform="translate(180 401.7) scale(.8 1)" text-anchor="middle" fill="#471a0e" font-family="Secular One" font-size="10"><tspan x="0" y="0">ב״ר בנימין משה הי״וו</tspan></text>
  </g>
  <g id="father_name_2*">
    <text transform="translate(180 413.4) scale(.8 1)" text-anchor="middle" fill="#471a0e" font-family="Secular One" font-size="10"><tspan x="0" y="0">חתן בערל גרינפעלד הי״וו</tspan></text>
