<svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 360 504">
  <text transform="translate(180 76.5) scale(1.2 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="8"><tspan x="0" y="0">מתוך שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 90.2) scale(1.2 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="8"><tspan x="0" y="0">על כל הטוב אשר גמלנו</tspan></text>
  <text transform="translate(180 116.3) scale(1.2 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="17.1"><tspan x="0" y="0">בשמחת הולדת בני שיחי׳</tspan></text>
  <text transform="translate(180 135.8) scale(1.2 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="10"><tspan x="0" y="0">למזל טוב</tspan></text>
  <text transform="translate(180 152.6) scale(1.2 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="7"><tspan x="0" y="0">אתכבד בזה להזמין את כל קרובי וידידי</tspan></text>
  <text transform="translate(180 165) scale(1.2 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="7"><tspan x="0" y="0">לבוא ולהשתתף בשמחתי אצל</tspan></text>
  <text transform="translate(180 238) scale(.7 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="67.5" font-weight="900"><tspan x="0" y="0">שלום זכר</tspan></text>
  <text transform="translate(180 278.7) scale(1.1 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="14.6"><tspan x="0" y="0">שתקיים אי״ה בליל שבת קודש</tspan></text>
  <text transform="translate(180 310.8) scale(1.1 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="20"><tspan x="0" y="0">פרשת נשא</tspan></text>
  <g id="location*">
    <text transform="translate(180 335.3) scale(1.1 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="11.5"><tspan x="0" y="0">בביהמ״ד לעלוב</tspan></text>
  </g>
  <g id="street*">
    <text transform="translate(180 350.4) scale(1.1 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="11.5"><tspan x="0" y="0">1693 49th Street</tspan></text>
  </g>
  <g id="greeting*">
    <text transform="translate(180 372.8) scale(1.1 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="14"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="host_name*">
    <text transform="translate(180 393.8) scale(1.1 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="14"><tspan x="0" y="0">מרדכי זאב ראטה</tspan></text>
  </g>
  <g id="father_name_1*">
    <text transform="translate(180 417.1) scale(1.1 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="9.2"><tspan x="0" y="0">ב״ר בנימין משה הי״וו</tspan></text>
  </g>
  <g id="father_name_2*">
    <text transform="translate(180 430) scale(1.1 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="9.2"><tspan x="0" y="0">חתן בערל גרינפעלד הי״וו</tspan></text>
  </g>
