<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_2" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 49.8)" text-anchor="middle" font-family="Heebo" font-weight="600"><tspan fill="#fff" font-size="11.9"><tspan x="0" y="0">מתוך שבח והודאה להשי״ת</tspan></tspan><tspan fill="#fff" font-size="11.9"><tspan x="0" y="14.2">על כל הטוב אשר גמלנו</tspan></tspan><tspan fill="#f09b00" font-size="18.3"><tspan x="0" y="36.2">בשמחת הולדת בני שיחי׳</tspan></tspan><tspan fill="#f1f2f2" font-size="14"><tspan x="0" y="53.1">למזל טוב</tspan></tspan><tspan fill="#fff" font-size="12.9"><tspan x="0" y="68.6">אתכבד בזה להזמין את כל קרובי וידידי</tspan></tspan><tspan fill="#fff" font-size="12.9"><tspan x="0" y="84.1">לבוא ולהשתתף בשמחתי אצל</tspan></tspan></text>
  <text transform="translate(180 224) scale(.6 1)" text-anchor="middle" fill="#ec8c00" font-family="Heebo" font-size="106" font-weight="600"><tspan x="0" y="0">שלום זכר</tspan></text>
  <text transform="translate(180 255.6) scale(.8 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="18" font-weight="600"><tspan x="0" y="0">שתתקיים אי״ה בליל שבת קודש</tspan></text>
