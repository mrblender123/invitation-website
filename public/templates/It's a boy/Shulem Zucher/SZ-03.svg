  </g>
  <g id="location">
    <text transform="translate(180 333) scale(.8 1)" text-anchor="middle" fill="#335678" font-family="Secular One" font-size="10.8"><tspan x="0" y="0">בביהמ״ד לעלוב</tspan><tspan x="0" y="13">1693 49th Street</tspan></text>
  </g>
