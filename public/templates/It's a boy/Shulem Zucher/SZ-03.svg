<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 114.1)" text-anchor="middle" fill="#325679" font-family="Secular One" font-size="11.2"><tspan x="0" y="0">מתוך שבח והודאה להשי״ת</tspan></text>
  <text transform="translate(180 127.4)" text-anchor="middle" fill="#325679" font-family="Secular One" font-size="11.2"><tspan x="0" y="0">על כל הטוב אשר גמלנו</tspan></text>
  <text transform="translate(180 145.8)" text-anchor="middle" fill="#325679" font-family="Secular One" font-size="17.2"><tspan x="0" y="0">בשמחת הולדת בני שיחי׳</tspan></text>
  <text transform="translate(180 161.4)" text-anchor="middle" fill="#325679" font-family="Secular One" font-size="12.1"><tspan x="0" y="0">למזל טוב</tspan></text>
  <text transform="translate(180 176.6)" text-anchor="middle" fill="#325679" font-family="Secular One" font-size="11"><tspan x="0" y="0">אתכבד בזה להזמין את כל קרובי וידידי</tspan></text>
  <text transform="translate(180 189.7)" text-anchor="middle" fill="#325679" font-family="Secular One" font-size="11.2"><tspan x="0" y="0">לבוא ולהשתתף בשמחתי אצל</tspan></text>
  <text transform="translate(180 261.2) scale(.6 1)" text-anchor="middle" fill="#0b1730" font-family="Secular One" font-size="81.6"><tspan x="0" y="0">שלום זכר</tspan></text>
  <text transform="translate(180 298.6) scale(.8 1)" text-anchor="middle" fill="#335678" font-family="Secular One" font-size="15.9"><tspan x="0" y="0">שתקיים אי״ה בליל שבת קודש</tspan></text>
  <g id="parsha">
