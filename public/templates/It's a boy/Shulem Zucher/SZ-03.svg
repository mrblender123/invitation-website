<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 215 288">
  <text transform="translate(107.5 61.8) scale(1 1)" text-anchor="middle" fill="#325678" font-family="Heebo" font-weight="700">
    <tspan font-size="6.1" x="0" y="0">מתוך שבח והודאה להשי״ת</tspan>
    <tspan font-size="6.1" x="0" y="7.3">על כל הטוב אשר גמלנו</tspan>
    <tspan font-size="9.4" x="0" y="18.6">בשמחת הולדת בני שיחי׳</tspan>
    <tspan font-size="6.6" x="0" y="26.6">למזל טוב</tspan>
    <tspan font-size="6.1" x="0" y="33.9">אתכבד בזה להזמין את כל קרובי וידידי</tspan>
    <tspan font-size="6.1" x="0" y="41.3">לבוא ולהשתתף בשמחתי אצל</tspan>
  </text>
  <text transform="translate(107.5 144) scale(.7 1)" text-anchor="middle" fill="#091630" font-family="Secular One" font-size="40.3"><tspan x="0" y="0">שלום זכר</tspan></text>
  <text transform="translate(107.5 170.6) scale(.9 1)" text-anchor="middle" fill="#325678" font-family="Secular One" font-size="9.1"><tspan x="0" y="0">שתקיים אי״ה בליל שבת קודש</tspan></text>
  <g id="parsha">
    <text transform="translate(107.5 182.5) scale(.9 1)" text-anchor="middle" fill="#325678" font-family="Secular One" font-size="12.9"><tspan x="0" y="0">פרשת נשא</tspan></text>
  </g>
  <g id="location">
    <text transform="translate(107.5 190.3) scale(.9 1)" text-anchor="middle" fill="#325678" font-family="Secular One" font-size="6.2"><tspan x="0" y="0">בביהמ״ד לעלוב</tspan><tspan x="0" y="7.4">1693 49th Street</tspan></text>
  </g>
  <text transform="translate(107.5 208.8) scale(.9 1)" text-anchor="middle" fill="#325678" font-family="Secular One" font-size="7.9"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  <g id="host_name">
    <text transform="translate(107.5 219.4) scale(.9 1)" text-anchor="middle" fill="#325678" font-family="Secular One" font-size="9.2"><tspan x="0" y="0">מרדכי זאב ראטה</tspan></text>
  </g>
  <g id="father_name_1">
    <text transform="translate(107.5 226.8) scale(.9 1)" text-anchor="middle" fill="#325678" font-family="Secular One" font-size="4.9"><tspan x="0" y="0">ב״ר בנימין משה הי״וו</tspan></text>
  </g>
  <g id="father_name_2">
    <text transform="translate(107.5 232.7) scale(.9 1)" text-anchor="middle" fill="#325678" font-family="Secular One" font-size="4.9"><tspan x="0" y="0">חתן בערל גרינעלד הי״וו</tspan></text>
  </g>
