  <text transform="translate(180 205.6) scale(1.1 1)" text-anchor="middle" fill="#d1b5a4" font-family="Secular One" font-size="11.3"><tspan x="0" y="0">אתכבד בזה להזמין את כל קרובי וידידי</tspan></text>
  <text transform="translate(180 215.8) scale(1.1 1)" text-anchor="middle" fill="#d1b5a4" font-family="Secular One" font-size="11.3"><tspan x="0" y="0">לבוא ולהשתתף בשמחתי אצל</tspan></text>
  <text transform="translate(180 262.5) scale(.7 1)" text-anchor="middle" fill="#fff" font-family="Heebo" font-size="58.3" font-weight="900"><tspan x="0" y="0">שלום זכר</tspan></text>
  <text transform="translate(180 282.5) scale(.9 1)" text-anchor="middle" fill="#d1b5a4" font-family="Secular One" font-size="13"><tspan x="0" y="0">שתקיים אי״ה בליל שבת קודש</tspan></text>
  <text transform="translate(180 297.4) scale(.9 1)" text-anchor="middle" fill="#d1b5a4" font-family="Secular One" font-size="17.8"><tspan x="0" y="0">פרשת נשא</tspan></text>
  <g id="location*">
