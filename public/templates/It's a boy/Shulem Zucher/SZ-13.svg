<svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 360 504">
  <text transform="translate(180 179.6) scale(1.1 1)" text-anchor="middle" fill="#d1b5a4" font-family="Secular One" font-size="14.6"><tspan x="0" y="0">בשמחת הולדת בני שיחי׳</tspan></text>
