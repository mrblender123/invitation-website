  <text transform="translate(180 133.5) scale(1 1)" text-anchor="middle" fill="#b9c1c9" font-family="Secular One" font-size="12.4"><tspan x="0" y="0">אתכבד בזה להזמין את כל קרובי וידידי</tspan></text>
  <text transform="translate(180 148.4) scale(1 1)" text-anchor="middle" fill="#b9c1c9" font-family="Secular One" font-size="12.6"><tspan x="0" y="0">לבוא ולהשתתף בשמחתי אצל</tspan></text>
  <text transform="translate(180 242.7) scale(.8 1)" text-anchor="middle" fill="#b9c1c9" font-family="Secular One" font-size="17.9"><tspan x="0" y="0">שתקיים אי״ה בליל שבת קודש</tspan></text>
  <g id="parsha*">
