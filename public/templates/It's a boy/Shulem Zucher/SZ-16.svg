<svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 360 504">
  <text transform="translate(180 63.5) scale(1 1)" text-anchor="middle" fill="#b9c1c9" font-family="Secular One" font-size="12.6"><tspan x="0" y="0">מתוך שבח והודאה להשי״ת</tspan></text>
