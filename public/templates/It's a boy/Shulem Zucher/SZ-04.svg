<svg xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 360 504">
  <text transform="translate(180 25) scale(1 1)" text-anchor="middle" fill="#321b0f" font-family="Heebo" font-size="13.6" font-weight="100"><tspan x="0" y="0">מתוך שבח והודאה להשי״ת</tspan></text>
