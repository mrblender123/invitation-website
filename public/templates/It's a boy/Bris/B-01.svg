<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 105.5)" text-anchor="middle" fill="#99824f" font-family="Heebo" font-size="6.8" font-weight="400"><tspan x="0" y="0">ברוב שמחה והודאה להשי״ת הננו מתכבדים להזמין את</tspan></text>
  <text transform="translate(180 117.1)" text-anchor="middle" fill="#99824f" font-family="Heebo" font-size="9.4" font-weight="400"><tspan x="0" y="0">ידידינו וקרובינו ומכובדינו שיחיו</tspan></text>
  <text transform="translate(180 126.4)" text-anchor="middle" fill="#99824f" font-family="Heebo" font-size="6.8" font-weight="400"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 257.1)" text-anchor="middle" fill="#99824f" font-family="Heebo" font-size="9.3" font-weight="400"><tspan x="0" y="0">לבננו בכורנו היקר</tspan></text>
  <text transform="translate(180 292.2)" text-anchor="middle" fill="#99824f" font-family="Heebo" font-size="7.6" font-weight="400"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  <g id="day*">
    <text transform="translate(180 308.8)" text-anchor="middle" fill="#151e31" font-family="Heebo" font-size="17.3" font-weight="400"><tspan x="0" y="0">ביום א׳ פרשת שמות</tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 324.6)" text-anchor="middle" fill="#151e31" font-family="Heebo" font-size="11.4" font-weight="400"><tspan x="0" y="0">באולם פרדס נח</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 338)" text-anchor="middle" fill="#151e31" font-family="Heebo" font-size="11.4" font-weight="400"><tspan x="0" y="0">5015 15th Ave</tspan></text>
  </g>
  <g id="shacharis_time*">
    <text transform="translate(180 356.7)" text-anchor="middle" fill="#99824f" font-family="Heebo" font-size="7.6" font-weight="400"><tspan x="0" y="0">שחרית בשעה</tspan></text>
  </g>
  <g id="bris_time*">
    <text transform="translate(180 366.5)" text-anchor="middle" fill="#99824f" font-family="Heebo" font-size="7.6" font-weight="400"><tspan x="0" y="0">ברית בשעה</tspan></text>
  </g>
  <g id="closing*">
    <text transform="translate(180 389.5)" text-anchor="middle" fill="#99824f" font-family="Heebo" font-size="6.6" font-weight="400"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="baby_name*">
