<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 163.1)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="6.2" font-weight="400"><tspan x="0" y="0">ברוב שמחה והודאה להשי״ת הננו מתכבדים להזמין את</tspan></text>
  <text transform="translate(180 171.4)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="7.4" font-weight="400"><tspan x="0" y="0">ידידינו וקרובינו ומכובדינו שיחיו</tspan></text>
  <text transform="translate(180 179.8)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="6.2" font-weight="400"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 287.3)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="8" font-weight="400"><tspan x="0" y="0">לבננו בכורנו היקר</tspan></text>
  <text transform="translate(180 305.3)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="6.5" font-weight="400"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  <g id="day*">
    <text transform="translate(180 319.5)" text-anchor="middle" fill="#6d9cbe" font-family="Playpen Sans Hebrew" font-size="14.8" font-weight="600"><tspan x="0" y="0">ביום א׳ פרשת שמות</tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 333)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="9.7" font-weight="600"><tspan x="0" y="0">באולם פרדס נח</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 344.5)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="9.7" font-weight="600"><tspan x="0" y="0">5015 15th Ave</tspan></text>
  </g>
  <g id="shacharis_time*">
    <text transform="translate(180 360.4)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="6.5" font-weight="400"><tspan x="0" y="0">שחרית בשעה</tspan></text>
  </g>
  <g id="bris_time*">
    <text transform="translate(180 368.8)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="6.5" font-weight="400"><tspan x="0" y="0">ברית בשעה</tspan></text>
  </g>
  <g id="closing*">
    <text transform="translate(180 436.2)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="11.6" font-weight="400"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="baby_name*">
    <text transform="translate(180 459.7)" text-anchor="middle" fill="#fbfbfb" font-family="Playpen Sans Hebrew" font-size="26.6" font-weight="800"><tspan x="0" y="0">ברוך זאב ראטה</tspan></text>
  </g>
  <g id="father_line_1*">
    <text transform="translate(180 471.5)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="10.2" font-weight="400"><tspan x="0" y="0">ב״ר בנימין משה הי״ו</tspan></text>
  </g>
  <g id="father_line_2*">
    <text transform="translate(180 482.1)" text-anchor="middle" fill="#ddab55" font-family="Heebo" font-size="10.2" font-weight="400"><tspan x="0" y="0">חתן בערל גרינפעלד הי״ו</tspan></text>
  </g>
</svg>
