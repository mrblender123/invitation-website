<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 118.6)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="6.1" font-weight="400"><tspan x="0" y="0">ברוב שמחה והודאה להשי״ת הננו מתכבדים להזמין את</tspan></text>
  <text transform="translate(180 128.9)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="8.5" font-weight="400"><tspan x="0" y="0">ידידינו וקרובינו ומכובדינו שיחיו</tspan></text>
  <text transform="translate(180 137.3)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="6.1" font-weight="400"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 267.5)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="8.4" font-weight="400"><tspan x="0" y="0">לבננו בכורנו היקר</tspan></text>
  <text transform="translate(180 286.5)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="6.8" font-weight="400"><tspan x="0" y="0">שתתקיים אי״ה</tspan></text>
  <g id="day*">
    <text transform="translate(180 301.4)" text-anchor="middle" fill="#151e31" font-family="Heebo" font-size="15.6" font-weight="400"><tspan x="0" y="0">ביום א׳ פרשת שמות</tspan></text>
  </g>
  <g id="hall*">
    <text transform="translate(180 315.6)" text-anchor="middle" fill="#151e31" font-family="Heebo" font-size="10.2" font-weight="400"><tspan x="0" y="0">באולם פרדס נח</tspan></text>
  </g>
  <g id="address*">
    <text transform="translate(180 327.7)" text-anchor="middle" fill="#151e31" font-family="Heebo" font-size="10.2" font-weight="400"><tspan x="0" y="0">5015 15th Ave</tspan></text>
  </g>
  <g id="shacharis_time*">
    <text transform="translate(180 344.5)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="6.8" font-weight="400"><tspan x="0" y="0">שחרית בשעה</tspan></text>
  </g>
  <g id="bris_time*">
    <text transform="translate(180 353.3)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="6.8" font-weight="400"><tspan x="0" y="0">ברית בשעה</tspan></text>
  </g>
  <g id="closing*">
    <text transform="translate(180 374)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="5.9" font-weight="400"><tspan x="0" y="0">ידידכם המצפה לקבל פניכם</tspan></text>
  </g>
  <g id="baby_name*">
    <text transform="translate(180 384.8)" text-anchor="middle" fill="#151e31" font-family="Heebo" font-size="13.5" font-weight="600"><tspan x="0" y="0">ברוך זאב ראטה</tspan></text>
  </g>
  <g id="father_line_1*">
    <text transform="translate(180 392)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="5.2" font-weight="400"><tspan x="0" y="0">ב״ר בנימין משה הי״ו</tspan></text>
  </g>
  <g id="father_line_2*">
    <text transform="translate(180 397.3)" text-anchor="middle" fill="#58595b" font-family="Heebo" font-size="5.2" font-weight="400"><tspan x="0" y="0">חתן בערל גרינפעלד הי״ו</tspan></text>
