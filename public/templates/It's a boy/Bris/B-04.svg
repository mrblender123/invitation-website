<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504">
  <text transform="translate(180 113.6)" text-anchor="middle" fill="#819cb3" font-family="Heebo" font-size="6.4" font-weight="400"><tspan x="0" y="0">ברוב שמחה והודאה להשי״ת הננו מתכבדים להזמין את</tspan></text>
  <text transform="translate(180 122.2)" text-anchor="middle" fill="#819cb3" font-family="Heebo" font-size="7.7" font-weight="400"><tspan x="0" y="0">ידידינו וקרובינו ומכובדינו שיחיו</tspan></text>
  <text transform="translate(180 131)" text-anchor="middle" fill="#819cb3" font-family="Heebo" font-size="6.4" font-weight="400"><tspan x="0" y="0">להשתתף עמנו בשמחת</tspan></text>
  <text transform="translate(180 254.2)" text-anchor="middle" fill="#819cb3" font-family="Heebo" font-size="8.8" font-weight="400"><tspan x="0" y="0">לבננו היקר</tspan></text>
