  <g id="day*">
    <text transform="translate(180 302.8)" text-anchor="middle" fill="#496278" font-family="Heebo" font-size="16.3" font-weight="600"><tspan x="0" y="0">ביום א׳ פרשת שמות</tspan></text>
  </g>
  <g id="hall*">
