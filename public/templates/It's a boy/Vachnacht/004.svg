<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 864 1216">

  <!-- EDITABLE: top praise line -->
  <g id="body_praise*" opacity=".6">
    <text text-anchor="middle" transform="translate(432 164.2) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="50.3"><tspan x="0" y="0">ברוב שבח והודאה להשי״ת</tspan></text>
  </g>

  <!-- EDITABLE: birth announcement -->
  <g id="body_birth*" opacity=".6">
    <text text-anchor="middle" transform="translate(432 266) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="67.6"><tspan x="0" y="0">בהולדת בני נ״י למזל טוב</tspan></text>
  </g>

  <!-- EDITABLE: invitation body -->
  <g id="body_invite*" opacity=".6">
    <text text-anchor="middle" transform="translate(432 352.8) rotate(.4) scale(.9 1)" fill="#a5b7ef" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="27"><tspan x="0" y="0">אתכבד בזה להזמין את כמע׳׳כ לבוא להשתתף בשמחתי</tspan></text>
  </g>

  <!-- EDITABLE: Vachnacht date -->
  <g id="vachnacht_date" opacity=".6">
    <text text-anchor="middle" transform="translate(432 665.5) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="37.2"><tspan x="0" y="0">שתתקיים אי׳׳ה למחרתו ביום ה׳</tspan></text>
  </g>

  <!-- EDITABLE: "at the home of" -->
  <g id="at_home_of*" opacity=".6">
    <text text-anchor="middle" transform="translate(432 718.8) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="34"><tspan x="0" y="0">בבית מו״ח</tspan></text>
  </g>

  <!-- EDITABLE: address -->
  <g id="vachnacht_address" opacity=".6">
    <text text-anchor="middle" transform="translate(432 766.4) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="Arvo, Arvo" font-size="25.9"><tspan x="0" y="0">2267 56TH STREET</tspan></text>
  </g>

  <!-- EDITABLE: Bris Milah header -->
  <g id="bris_header*" opacity=".6">
    <text text-anchor="middle" transform="translate(432 841.4) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="forma-djr-hebrew-banner" font-size="74.5" font-weight="400" letter-spacing="-3"><tspan x="0" y="0">ברית מילה</tspan></text>
  </g>

  <!-- EDITABLE: Bris date -->
  <g id="bris_date" opacity=".6">
    <text text-anchor="middle" transform="translate(432 899.5) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="25.9"><tspan x="0" y="0">שתתקיים אי׳׳ה למחרתו ביום ה׳</tspan></text>
  </g>

  <!-- EDITABLE: Bris location -->
  <g id="bris_location" opacity=".6">
    <text text-anchor="middle" transform="translate(432 937.2) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="25.9"><tspan x="0" y="0">בביהמ׳׳ד נחלת סקווירא</tspan></text>
  </g>

  <!-- EDITABLE: awaiting guests -->
  <g id="awaiting_you*" opacity=".6">
    <text text-anchor="middle" transform="translate(432 998.9) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="32.4"><tspan x="0" y="0">המצפה לקבל פניכם</tspan></text>
  </g>

  <!-- EDITABLE: father name (large) -->
  <g id="father_name" opacity=".6">
    <text text-anchor="middle" transform="translate(432 1087.2) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="68"><tspan x="0" y="0">מרדכי ראטה</tspan></text>
  </g>

  <!-- EDITABLE: host / son name -->
  <g id="host_name" opacity=".6">
    <text text-anchor="middle" transform="translate(432 1143.2) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="17"><tspan x="0" y="0">ב״ר שלמה הי״ו</tspan></text>
  </g>

  <!-- EDITABLE: grandfather name -->
  <g id="grandfather_name" opacity=".6">
    <text text-anchor="middle" transform="translate(432 1165.2) rotate(.4) scale(.9 1)" fill="#8b9bdf" font-family="GveretLevinAlefAlefAlef-Regular, 'Gveret Levin AlefAlefAlef'" font-size="17"><tspan x="0" y="0">חתן ר׳ זרח ניישטיין הי״ו</tspan></text>
  </g>

</svg>
